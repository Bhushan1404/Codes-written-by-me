---
- name: VM Provisioning Pre-Checks
  hosts: localhost
  gather_facts: true
  no_log: false
  vars_files:
    - var_list_linux.yml
  vars:
    operating_system: "{{ var_operating_system }}"
    disk_size_gb: "{{ var_disk1_size_gb }}"
    memory_mb: "{{ var_memory_mb }}"
  tasks:
    - name: Get vcenter credentials from cyberark
      ansible.builtin.uri:
        url: https://{{ cyberark_host | default() }}/AIMWebService/api/Accounts?AppID={{ app_id_vcenter | default() }}&username={{
          var_vcenter_username | default() }}
        method: GET
        validate_certs: false
        return_content: true
      register: vcenter_cred
      no_log: true
    - name: Validate Template present in vCenter
      block:
        - name: Gather Template info
          community.vmware.vmware_vm_info:
            hostname: "{{ var_vcenter_host | default() }}"
            username: "{{ var_vcenter_username | default() }}"
            password: "{{ vcenter_cred.json.Content }}"
            vm_name: "{{ template_name | default() }}"
          register: vm_info
          failed_when: false
        - name: Set facts to check the Template exist or not
          ansible.builtin.set_fact:
            vm_exists: "{% if vm_info.virtual_machines is defined %}true{% else %}false{%
              endif %}"
        - name: Check Template availability in vCenter
          ansible.builtin.assert:
            that:
              - vm_exists | bool == true
            success_msg: Template available in vCenter.
            fail_msg:
              - "target_host        : {{ inventory_hostname | default('') }}"
              - "task_name          : Template validation"
              - "status_msg         : The input Template does not belongs to the
                current vCenter"
              - "status             : Failed"
              - "execution_date_time: {{ ansible_date_time['iso8601'] }}"
    - name: Validate user input Hostname should not be present in vCenter
      block:
        - name: Gather VM info
          community.vmware.vmware_vm_info:
            hostname: "{{ var_vcenter_host | default() }}"
            username: "{{ var_vcenter_username | default() }}"
            password: "{{ vcenter_cred.json.Content }}"
            vm_name: "{{ var_hostname }}"
          register: host_info
          failed_when: false
        - name: Set facts to check the Host exist or not
          ansible.builtin.set_fact:
            host_exists: "{% if host_info.virtual_machines is defined %}true{% else
              %}false{% endif %}"
        - name: Check Host availability in vCenter
          ansible.builtin.assert:
            that:
              - host_exists | bool == false
            success_msg: VM Hostname is not already available in vCenter.
            fail_msg:
              - "target_host        : {{ inventory_hostname | default('') }}"
              - "task_name          : Hostname validation"
              - "status_msg         : The user input Host - {{ var_hostname }}
                already belongs to the current vCenter."
              - "status             : Failed"
              - "execution_date_time: {{ ansible_date_time['iso8601'] }}"
    - name: Validate OS
      block:
        - name: Map operating system to os type
          ansible.builtin.set_fact:
            os_type: "{{ os_map[operating_system] | default() }}"
        - name: Set template OS fact
          ansible.builtin.set_fact:
            template_os: "{{ vm_info.virtual_machines[0].guest_fullname }}"
        - name: Check if Template OS matches with the OS provided in user input
          ansible.builtin.assert:
            that:
              - os_type == template_os
            success_msg: OS version matches with the template.
            fail_msg:
              - "target_host        : {{ inventory_hostname | default('') }}"
              - "task_name          : OS validation"
              - "status_msg         : OS provided in user input i.e. {{
                operating_system | default() }} does not matches with the OS -
                {{ template_os | default() }} of the provided template - {{
                template_name | default() }}."
              - "status             : Failed"
              - "execution_date_time: {{ ansible_date_time['iso8601'] }}"
    - name: Validate VM Tools installed in Template
      block:
        - name: Get template info
          community.vmware.vmware_guest_info:
            hostname: "{{ var_vcenter_host | default() }}"
            username: "{{ var_vcenter_username | default() }}"
            password: "{{ vcenter_cred.json.Content }}"
            datacenter: "{{ datacenter_name | default() }}"
            name: "{{ template_name | default() }}"
          register: template_info
        - name: Check VM Tools installed in Template
          ansible.builtin.assert:
            that:
              - template_info.instance.guest_tools_status !=
                "guestToolsNotInstalled"
            success_msg: VMWare Tools installed in template.
            fail_msg:
              - "target_host        : {{ inventory_hostname | default('') }}"
              - "task_name          : VM Tools validation"
              - "status_msg         : VMware Tools is not installed on template
                {{ template_name | default() }}"
              - "status             : Failed"
              - "execution_date_time: {{ ansible_date_time['iso8601'] }}"
    - name: Validate Disk Size
      block:
        - name: Get disk info of template
          community.vmware.vmware_guest_disk_info:
            hostname: "{{ var_vcenter_host | default() }}"
            username: "{{ var_vcenter_username | default() }}"
            password: "{{ vcenter_cred.json.Content }}"
            datacenter: "{{ datacenter_name | default() }}"
            name: "{{ template_name | default() }}"
          register: temp_info
        - name: Set disk size as fact
          ansible.builtin.set_fact:
            template_disk_size_gb: "{{ (temp_info.guest_disk_info['0'].capacity_in_bytes |
              int) / (1024 * 1024 * 1024) | round(2) }}"
        - name: Check disk size
          ansible.builtin.assert:
            that:
              - disk_size_gb | int >=  template_disk_size_gb | int
            success_msg: Provided disk size is equal or more than the disk size of template.
            fail_msg:
              - "target_host        : {{ inventory_hostname | default('') }}"
              - "task_name          : Check the disk size "
              - "status_msg         : The provided disk size is less than the
                disk size of template. Disk size cannot be reduced."
              - "status             : Failed"
              - "execution_date_time: {{ ansible_date_time['iso8601'] }}"
    - name: Get cluster details
      block:
        - name: Gather cluster info
          vmware.vmware.cluster_info:
            hostname: "{{ var_vcenter_host | default() }}"
            username: "{{ var_vcenter_username | default() }}"
            password: "{{ vcenter_cred.json.Content }}"
            datacenter: "{{ datacenter_name | default() }}"
            cluster_name: "{{ item }}"
          loop: "{{ cluster_names | default() }}"
          register: cluster_results
        - name: Add qualified clusters
          ansible.builtin.set_fact:
            qualified_clusters: "{{ qualified_clusters + [{'name': cluster_name,
              'free_storage': free_storage}] }}"
          loop: "{{ cluster_results.results }}"
          loop_control:
            label: "{{ cluster_name | default() }}"
          vars:
            cluster_name: "{{ item.invocation.module_args.cluster_name }}"
            summary: "{{ item.clusters[cluster_name].resource_summary }}"
            cpu_util: "{{ ((summary.cpuUsedMHz | int) * 100 / (summary.cpuCapacityMHz |
              int)) | round(2) }}"
            mem_util: "{{ ((summary.memUsedMB | int) * 100 / (summary.memCapacityMB | int))
              | round(2) }}"
            storage_util: "{{ ((summary.storageUsedMB | int) * 100 /
              (summary.storageCapacityMB | int)) | round(2) }}"
            free_storage: "{{ (summary.storageCapacityMB | int) - (summary.storageUsedMB |
              int) }}"
          when: cpu_util | int < utilization_threshold | int and mem_util | int <
            utilization_threshold | int and storage_util | int <
            utilization_threshold | int
        - name: Add disqualified clusters
          ansible.builtin.set_fact:
            disqualified_clusters: "{{ disqualified_clusters + [cluster_name] }}"
          loop: "{{ cluster_results.results }}"
          loop_control:
            label: "{{ cluster_name | default() }}"
          vars:
            cluster_name: "{{ item.invocation.module_args.cluster_name }}"
            summary: "{{ item.clusters[cluster_name].resource_summary }}"
            cpu_util: "{{ ((summary.cpuUsedMHz | int) * 100 / (summary.cpuCapacityMHz |
              int)) | round(2) }}"
            mem_util: "{{ ((summary.memUsedMB | int) * 100 / (summary.memCapacityMB | int))
              | round(2) }}"
            storage_util: "{{ ((summary.storageUsedMB | int) * 100 /
              (summary.storageCapacityMB | int)) | round(2) }}"
          when: cpu_util | int >= utilization_threshold | int or mem_util | int >=
            utilization_threshold | int or storage_util | int >=
            utilization_threshold | int
        - name: Select cluster with most free storage
          ansible.builtin.set_fact:
            selected_cluster: "{{ (qualified_clusters | sort(attribute='free_storage',
              reverse=true))[0].name }}"
          when: qualified_clusters | length > 0
        - name: Debug
          ansible.builtin.debug:
            msg:
              CLUSTER: "{{ selected_cluster | default() }}"
        - name: Display selected cluster
          ansible.builtin.debug:
            msg: "Selected cluster: {{ selected_cluster | default() }} with maximum free
              storage and all metrics below 80%."
          when: selected_cluster is defined
        - name: Validate IP
          ansible.builtin.assert:
            that:
              - qualified_clusters | length > 0
            success_msg: "Cluster: {{ selected_cluster | default() }} is free to use"
            fail_msg:
              - "target_host        : {{ inventory_hostname | default('') }}"
              - "task_name          : Validate if any cluster is free to use "
              - "status_msg         : All clusters exceed 80% utilization in one
                or more metrics."
              - "status             : Failed"
              - "execution_date_time: {{ ansible_date_time['iso8601'] }}"
    - name: Validate datastore availability and storage availability for new VM
      block:
        - name: Set datastore variable
          ansible.builtin.set_fact:
            target_datastore: "{{ datastore_map[selected_cluster | default()] }}"
        - name: Show selected datastore
          ansible.builtin.debug:
            msg: Selected datastore is {{ target_datastore | default() }}
        - name: Gather datastore facts
          community.vmware.vmware_datastore_info:
            hostname: "{{ var_vcenter_host | default() }}"
            username: "{{ var_vcenter_username | default() }}"
            password: "{{ vcenter_cred.json.Content }}"
            name: "{{ target_datastore | default() }}"
          register: datastore_info
        - name: Check the datastore availablity
          ansible.builtin.assert:
            that:
              - datastore_info.datastores | length > 0
            success_msg: Datastore available in the vCenter.
            fail_msg:
              - "target_host        : {{ inventory_hostname | default('') }}"
              - "task_name          : Check the datasotre availablity "
              - "status_msg         : The provided datastore may not be
                available in this vCenter or it might be wrong datastore name"
              - "status             : Failed"
              - "execution_date_time: {{ ansible_date_time['iso8601'] }}"
        - name: Convert datastore capacity to GB
          ansible.builtin.set_fact:
            ds_size_gb: "{{ (datastore_info.datastores[0].freeSpace / 1024 / 1024 / 1024) |
              round(2) }}"
          when: datastore_info.datastores | length > 0
        - name: Convert memory capacity to GB
          ansible.builtin.set_fact:
            memory_size_gb: "{{ (memory_mb | int / 1024) | round(2) }}"
        - name: Calculate VM Size
          ansible.builtin.set_fact:
            vm_size: "{{ (disk_size_gb | float + memory_size_gb | float) * 1.2 | round(2)
              }}"
        - name: Check datastore free space
          ansible.builtin.assert:
            that:
              - ds_size_gb | int >= vm_size | int
            success_msg: Datastore has sufficient space for VM clone.
            fail_msg:
              - "target_host        : {{ inventory_hostname | default('') }}"
              - "task_name          : Check datastore free space"
              - "status_msg         : Insufficient datastore free space to
                perform VM clone"
              - "status             : Failed"
              - "execution_date_time: {{ ansible_date_time['iso8601'] }}"
        - name: ServiceTheater Update for all tasks in VM clone Pre-Checks
          ansible.builtin.debug:
            msg:
              - "target_host        : {{ inventory_hostname | default('') }}"
              - "task_name          : VM clone pre-checks status"
              - >-
                status_msg         : Following Pre-Checks are successful for VM
                clone:

                1. Template present in vCenter.

                2. User Input VM Hostame is free to use.

                3. OS name of Template matches with the user provided OS.

                4. VMWare Tools is installed in the Template.

                5. User provided Disk size is equal or more than the disk size of template.

                6. IP is free to use.

                7. Datastore is available in vCenter and has enough free space for VM clone.

                8. Cluster: {{ selected_cluster | default() }} is free to use.
              - "status             : Success"
              - "execution_date_time: {{ ansible_date_time['iso8601'] }}"
