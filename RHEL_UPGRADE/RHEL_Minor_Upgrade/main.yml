---
# Play -1 (Create a ansible Dynamic in memory inventory)
- name: "Play to Create a dynamic inventiry"
  hosts: localhost
  gather_facts: false
  collections:
    - community.vmware
  vars:
    in_host_name: "{{ ipadd }}"
    usr_hostname: "{{ hostname }}"
    os_type_input: "{{ ostype }}"
    os_type: "{{ os_type_input | capitalize }}"
  tasks:
    - name: Capture the details if any failed task while generating the in memory inventory
      block:
        - name: Split the Host IPAdd and name
          ansible.builtin.set_fact:
            host_name: "{{ in_host_name.split(',') }}"
            input_hostname: "{{ usr_hostname.split(',') }}"
          failed_when: in_host_name is undefined and usr_hostname is undefined

        - name: Map the IPAdd and host name into inventory information
          ansible.builtin.set_fact:
            host_info: "{{ dict(host_name | zip(input_hostname)) | dict2items(key_name='in_host_name', value_name='usr_hostname') }}"
          failed_when: host_name is undefined and input_hostname is undefined

        - name: Block to create dynamic inventory when the OS type is Windows
          block:
            - name: Add the hosts into inventory group if it is Windows servers
              ansible.builtin.add_host:
                name: "{{ item.in_host_name }}"
                input_hostname: "{{ item.usr_hostname }}"
                os_type: "{{ os_type | default() }}"
                ansible_user: root
                ansible_password: Wipro@123
                ansible_ssh_port: 22
                group: exec_nodes
              loop: "{{ host_info | default('') }}"
              when: host_info is defined
      rescue:
        - name: ServiceTheater failure update
          ansible.builtin.debug:
            msg:
              - "target_host          : {{ inventory_hostname }}"
              - "task_name            : {{ ansible_failed_task['name'] }}"
              - "status_msg           : {{ ansible_failed_result['msg'] }}"
              - "status               : failed "
              - "execution_date_time  : {{ ansible_date_time['iso8601'] }}"

        - name: Failed the playbook execution if main block having any failed taks
          ansible.builtin.fail:
            msg: "Error occurred while generating the in memory inventory"

- name: Play for RHEL 7 to RHEL 8 inplace upgarde
  hosts: exec_nodes
  gather_facts: false
  collections:
    - community.general
  vars:
    post_reboot_delay: 120
    filesystem_to_check: 
      - '/boot'
    kernel_version: '3.10'
    rhsm_repositories:
      - rhel-7-server-rpms
      - rhel-7-server-extras-rpms
    vstr_server_type: "{{ server_type }}"
  tasks: 
    # Block to validate system configuration   
    - name: Block to validate system configuration
      block: 
        # Run the setup and collect the required minimal facts
        - name: Run setup module
          ansible.builtin.setup:
          register: system_facts
     
        - name: Validate system requirements
          ansible.builtin.assert:
            that:
              - 'system_facts.ansible_facts.ansible_distribution_major_version == "7"'
              - 'system_facts.ansible_facts.ansible_kernel is match(kernel_version)'
              - 'vstr_server_type == "virtual"'
            fail_msg: 'System did not meet requirements for leapp upgrade'  
            success_msg: Current OS version is {{ ansible_distribution_version }} and system met requirements to perform the leapp upgrade

        - name: Print current verion of RHEL
          ansible.builtin.debug:
            var: system_facts.ansible_facts.ansible_distribution_version           

        - name: Initialize the filesystem information 
          ansible.builtin.set_fact:
            filesystem_info: "{{ filesystem_info | default({}) }}"
          loop: "{{ filesystem_to_check }}"
          loop_control:
            loop_var: item
          when: "system_facts.ansible_facts.ansible_mounts | selectattr('mount', '==', item) | list | length > 0"

        - name: Gather filesystem information details
          ansible.builtin.set_fact:
            filesystem_info: "{{ filesystem_info | combine({item: filesystem_info_item}) }}"
          vars:
            filesystem_info_item: "{{ system_facts.ansible_facts.ansible_mounts | selectattr('mount', '==', item) | list | first }}"
          loop: "{{ filesystem_to_check }}"
          loop_control:
            loop_var: item
          when: "system_facts.ansible_facts.ansible_mounts | selectattr('mount', '==', item) | list | length > 0"

        - name: Calculate free space percentage for filesystem
          ansible.builtin.set_fact:
            filesystem_info: "{{ filesystem_info | combine({item: filesystem_info[item] | combine({'filesystem_free_percent': (100 * filesystem_info[item].size_available / filesystem_info[item].size_total)|int }) }) }}"
          loop: "{{ filesystem_to_check }}"
          loop_control:
            loop_var: item
          when: "filesystem_info[item] is defined"

        - name: Check free space percentage for filesystem
          ansible.builtin.assert:
            that: "'filesystem_free_percent' not in filesystem_info[item] or filesystem_info[item].filesystem_free_percent >= 40"
            fail_msg: "At least one filesystem has less than 40% free space!"
          loop: "{{ filesystem_to_check }}"
          loop_control:
            loop_var: item
          when: "filesystem_info[item] is defined"

        - name: Search for non-RHEL packages
          ansible.builtin.shell:
            cmd: rpm -qa --qf '%{NAME}-%{VERSION}-%{RELEASE}.%{ARCH}\t%{VENDOR}\n' | grep -v 'Red Hat, Inc.' | sort
          register: non_rhel_pkgs

        - name: Print non-RHEL packages 
          ansible.builtin.debug: 
            var: non_rhel_pkgs.stdout_lines

        - name: Enable RHEL7 repository
          ansible.builtin.shell: |
            subscription-manager repos --enable=rhel-7-server-rpms;
            subscription-manager repos --enable=rhel-7-server-extras-rpms;
            subscription-manager repos --disable=rhel-7-server-optional-rpms

        - name: Clear the yum logs
          ansible.builtin.command: "yum clean all"
          args:
            warn: no
            
        - name: Install yum-utils packages if not installed
          ansible.builtin.yum:
            name: yum-utils
            state: latest
            disablerepo: "*"  
            enablerepo: "{{ rhsm_repositories | default() }}"    
          when:
            - ansible_distribution_major_version | int == 7
          register: updates_available 
            
        - name: Check if any updates avalaible for RHEL minor upgrade
          ansible.builtin.yum:
            list: updates
          register: yumlist
          ignore_errors: true

        - name: Perform minor RHEL version upgrade
          ansible.builtin.yum:
            name: '*'
            state: latest
            disablerepo: "*"  
            enablerepo: "{{ rhsm_repositories }}"    
          when:
            - ansible_distribution_major_version | int == 7
            - yumlist.results | length | int > 0
          register: updates_available
          async: 1800
          poll: 60 

        - name: Reboot when updates applied
          ansible.builtin.reboot:
            reboot_timeout: 180
            post_reboot_delay: "{{ post_reboot_delay }}"
          when: updates_available.changed

        - name: Check if any further updates avalaible for RHEL minor upgrade
          ansible.builtin.yum:
            list: updates
          register: yumlist_after
          ignore_errors: true
          
        - name: Print list of packages if any still to be updated
          ansible.builtin.debug:
            var: yumlist_after.results

        - name: ServiceTheater Sucess Update
          ansible.builtin.debug:
            msg:
              - "target_host : {{ inventory_hostname | default() }}"
              - "task_name   : Perform RHEL minor version upgrade"
              - "status_msg    : Minor version upgrade is completed"
              - "status : Sucess"
              - "execution_date_time : {{ ansible_date_time['iso8601'] }}"
          when: 
            - yumlist_after.results | length | int == 0
      rescue:
        - name: ServiceTheater update
          ansible.builtin.debug:
            msg:
              - "target_host        : {{ inventory_hostname | default() }}"
              - "task_name          : {{ ansible_failed_task['name'] }}"
              - "status_msg         : {{ ansible_failed_result['msg'] }}"
              - "status             : Failed"
              - "execution_date_time: {{ ansible_date_time['iso8601'] }}"
 
        - name: End the play if any task failed
          ansible.builtin.fail:
            msg: "Play execution is failed for more information please check the failed task"