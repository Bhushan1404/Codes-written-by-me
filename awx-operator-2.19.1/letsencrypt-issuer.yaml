apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
   name: letsencrypt-issuer
   namespace: awx
spec:
  acme:
     server: https://acme-v02.api.letsencrypt.org/directory
     privateKeySecretRef:
             name: letsencrypt-private-key
     solvers:
        - http01:
              ingress:
                  class: nginx
